<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outreach Results Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a2540;
            --primary-light: #1a3a5a;
            --accent: #ff6b35;
            --accent-light: #ff8c61;
            --bg: #f8f9fc;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --shadow: rgba(15, 23, 42, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 140, 97, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.125rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 1.5rem;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 2px solid #fcc;
            border-radius: 12px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: center;
            color: #c33;
        }

        .results-grid {
            display: grid;
            gap: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 1px 3px var(--shadow), 0 8px 24px var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 12px var(--shadow), 0 16px 48px var(--shadow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--bg);
        }

        .company-info {
            flex: 1;
        }

        .company-name {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .company-website {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .company-website:hover {
            color: var(--accent-light);
            gap: 0.75rem;
        }

        .lead-info {
            background: linear-gradient(135deg, var(--bg) 0%, #e8eef5 100%);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .lead-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .lead-email {
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .summary {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        .sequence-section {
            margin-top: 2rem;
        }

        .sequence-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .sequence-title {
            font-family: 'Crimson Pro', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        .email-count {
            background: var(--accent);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .emails-accordion {
            display: grid;
            gap: 0.75rem;
        }

        .email-item {
            background: var(--bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .email-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .email-header:hover {
            background: rgba(255, 107, 53, 0.05);
        }

        .email-number {
            background: var(--primary);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .email-subject {
            flex: 1;
            font-weight: 600;
            color: var(--primary);
        }

        .expand-icon {
            transition: transform 0.3s ease;
            color: var(--text-secondary);
        }

        .email-item.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .email-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .email-item.expanded .email-body {
            max-height: 1000px;
        }

        .email-content {
            padding: 1.25rem;
            background: white;
            border-top: 1px solid var(--border);
            white-space: pre-wrap;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8eef5 100%);
            border-radius: 12px;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .result-card {
                padding: 1.5rem;
            }

            .company-name {
                font-size: 1.5rem;
            }

            .stats-bar {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>Outreach Results</h1>
            <p class="subtitle">Your comprehensive campaign overview</p>
        </div>
    </div>

    <div class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading outreach results...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="stats" style="display: none;"></div>

        <div id="results" class="results-grid"></div>
    </div>

    <script>
        const API_URL = 'https://n8n.systemifyautomation.com/webhook/get-oureach-results';

        async function fetchResults() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('results');
            const statsContainer = document.getElementById('stats');

            // Show stats
            const totalEmails = results.length * 6;
            statsContainer.innerHTML = `
                <div class="stats-bar">
                    <div class="stat">
                        <span class="stat-label">Total Leads</span>
                        <span class="stat-value">${results.length}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Total Emails</span>
                        <span class="stat-value">${totalEmails}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Companies</span>
                        <span class="stat-value">${new Set(results.map(r => r.company_name)).size}</span>
                    </div>
                </div>
            `;
            statsContainer.style.display = 'block';

            // Display each result
            results.forEach((result, index) => {
                const card = createResultCard(result, index);
                resultsContainer.appendChild(card);
            });
        }

        function createResultCard(result, index) {
            const card = document.createElement('div');
            card.className = 'result-card';
            card.style.animationDelay = `${index * 0.1}s`;

            const emailsHTML = result.sequence.map((email, emailIndex) => `
                <div class="email-item" data-email-index="${emailIndex}">
                    <div class="email-header">
                        <div class="email-number">${emailIndex + 1}</div>
                        <div class="email-subject">${escapeHtml(email.subject)}</div>
                        <svg class="expand-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="email-body">
                        <div class="email-content">${escapeHtml(email.body)}</div>
                    </div>
                </div>
            `).join('');

            card.innerHTML = `
                <div class="card-header">
                    <div class="company-info">
                        <h2 class="company-name">${escapeHtml(result.company_name)}</h2>
                        <a href="${escapeHtml(result.company_website)}" target="_blank" class="company-website">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="2" y1="12" x2="22" y2="12"/>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                            </svg>
                            ${escapeHtml(result.company_website)}
                        </a>
                    </div>
                </div>

                <div class="lead-info">
                    <div class="lead-name">${escapeHtml(result.lead_name)}</div>
                    <div class="lead-email">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        ${escapeHtml(result.lead_email)}
                    </div>
                </div>

                <div class="summary">${escapeHtml(result.summary)}</div>

                <div class="sequence-section">
                    <div class="sequence-header">
                        <h3 class="sequence-title">Email Sequence</h3>
                        <span class="email-count">${result.sequence.length} emails</span>
                    </div>
                    <div class="emails-accordion">
                        ${emailsHTML}
                    </div>
                </div>
            `;

            // Add click handlers for accordion
            const emailItems = card.querySelectorAll('.email-item');
            emailItems.forEach(item => {
                const header = item.querySelector('.email-header');
                header.addEventListener('click', () => {
                    item.classList.toggle('expanded');
                });
            });

            return card;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = `Error loading results: ${message}`;
            errorDiv.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Fetch results on page load
        fetchResults();
    </script>
</body>
</html>
